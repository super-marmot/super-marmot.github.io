    <!-- header -->
    <text x="24" y="74" fill="#5D5D5D" font-size="15">‹</text>
    <text x="120" y="74" fill="#0D0D0D" font-size="17" font-weight="600">Settings</text>

    <!-- appearance -->
    <text x="24" y="112" fill="#0D0D0D" font-size="14" font-weight="600">Appearance</text>
    <text x="24" y="130" fill="#9A9A9A" font-size="11">Dark, light, or follow your device setting.</text>
    <rect x="24" y="140" width="86" height="32" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="45" y="161" fill="#5D5D5D" font-size="12.5" font-weight="600">System</text>
    <rect x="117" y="140" width="86" height="32" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="145" y="161" fill="#5D5D5D" font-size="12.5" font-weight="600">Dark</text>
    <rect x="210" y="140" width="86" height="32" rx="8" fill="#0D0D0D"/>
    <text x="236" y="161" fill="#FFFFFF" font-size="12.5" font-weight="600">Light</text>

    <!-- temperature -->
    <text x="24" y="210" fill="#0D0D0D" font-size="14" font-weight="600">Temperature</text>
    <text x="24" y="228" fill="#9A9A9A" font-size="11">Higher = more creative</text>
    <circle cx="204" cy="214" r="15" fill="#F4F4F4" stroke="#E3E3E3"/>
    <text x="200" y="219" fill="#0D0D0D" font-size="14" font-weight="700">−</text>
    <text x="238" y="219" fill="#0D0D0D" font-size="13" font-weight="700" text-anchor="middle">0.70</text>
    <circle cx="272" cy="214" r="15" fill="#F4F4F4" stroke="#E3E3E3"/>
    <text x="267" y="219" fill="#0D0D0D" font-size="14" font-weight="700">+</text>

