    <text x="24" y="484" fill="#0D0D0D" font-size="14" font-weight="600">System prompt</text>
    <rect x="24" y="494" width="272" height="56" rx="12" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="40" y="516" fill="#5D5D5D" font-size="12">You are a helpful assistant running locally</text>
