    <rect x="252" y="256" width="44" height="24" rx="12" fill="#0D0D0D"/>
    <circle cx="284" cy="268" r="9" fill="#FFFFFF"/>
    <text x="24" y="306" fill="#0D0D0D" font-size="14" font-weight="600">GPU acceleration (Android)</text>
    <text x="24" y="322" fill="#9A9A9A" font-size="11">Experimental · OpenCL on recent Snapdragons</text>
    <rect x="252" y="298" width="44" height="24" rx="12" fill="#F4F4F4" stroke="#E3E3E3"/>
    <circle cx="264" cy="310" r="9" fill="#FFFFFF" stroke="#E3E3E3"/>

    <!-- context length -->
    <text x="24" y="352" fill="#0D0D0D" font-size="14" font-weight="600">Context length</text>
    <rect x="24" y="362" width="86" height="30" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="49" y="382" fill="#5D5D5D" font-size="12.5" font-weight="600">2048</text>
    <rect x="117" y="362" width="86" height="30" rx="8" fill="#0D0D0D"/>
    <text x="142" y="382" fill="#FFFFFF" font-size="12.5" font-weight="600">4096</text>
    <rect x="210" y="362" width="86" height="30" rx="8" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="235" y="382" fill="#5D5D5D" font-size="12.5" font-weight="600">8192</text>

    <!-- persona -->
    <text x="24" y="420" fill="#0D0D0D" font-size="14" font-weight="600">Persona</text>
    <rect x="24" y="430" width="72" height="26" rx="13" fill="#0D0D0D"/>
    <text x="38" y="447" fill="#FFFFFF" font-size="11.5" font-weight="600">Concise</text>
    <rect x="102" y="430" width="62" height="26" rx="13" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="116" y="447" fill="#5D5D5D" font-size="11.5" font-weight="600">Coach</text>
    <rect x="170" y="430" width="58" height="26" rx="13" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="184" y="447" fill="#5D5D5D" font-size="11.5" font-weight="600">Tutor</text>
    <rect x="234" y="430" width="62" height="26" rx="13" fill="#FFFFFF" stroke="#E3E3E3"/>
    <text x="247" y="447" fill="#5D5D5D" font-size="11.5" font-weight="600">Pirate</text>
